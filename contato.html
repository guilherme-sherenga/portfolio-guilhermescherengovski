<!-- Por fim, conteúdo principal da seção de "Contato" -->
<main>
  <section class="contato-container">

    <!-- Foi criado uma página no forms que torna a seção utilizável, de forma que eu recebo, via e-mail, a mensagem que a pessoa me destinar -->
    <h1 class="fade-in">Contato</h1>

    <p class="subtitulo fade-in delay-1">
      Entre em contato comigo para dúvidas, sugestões ou oportunidades.
    </p>

    <div class="contato-box fade-in delay-2">

      <form class="form-contato" action="https://formspree.io/f/mojkyezg" method="POST">

        <input type="text" name="nome" placeholder="Nome" required>

        <input type="email" placeholder="Email" required>

        <textarea name="Mensagem" placeholder="Mensagem" required></textarea>

        <button type="submit">Enviar</button>

      </form>

    </div>

  </section>
